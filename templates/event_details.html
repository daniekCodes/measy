{%extends "base.html"%}
{%block content%}

<div>
    <h1>{{event.title}}</h1>
    <p>Beschreibung: {{event.description}}</p>

    {%if event.location_type == "physical%}
    <p>Ort: {{event.street}} {{event.housenumber}}, {{event.plz}}{{event.city}}</p>
    {%else%}
    <p>Link zur meeting: <a href="{{event.meeting_link}}">Hier klicken</a></p>
    {%endif%}
</div>

{%endblock%}
