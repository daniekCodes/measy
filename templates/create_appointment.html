{% extends "base.html" %}
{% block content %}

<nav>

</nav>

<h2>Neues Event erstellen</h2>

<form id="create_event_form" action="{{ url_for('create_appointment', user_id=user_id) }}" method="POST">

    <div>
        <label for="title">Titel</label>
        <input type="text" name="title" id="title" required />
    </div>

    <div>
        <label for="description">Beschreibung</label>
        <input type="text" name="description" id="description"/>
    </div>

    <div>
        <fieldset>
            <legend>Vor Ort oder Online?</legend>
            <label>
                <input type="radio" name="location_type" value="physical" required onchange="location_toggle()">
                Vor Ort
            </label>
            <label>
                <input type="radio" name="location_type" value="virtual" onchange="location_toggle()">
                Online
            </label>
        </fieldset>

        <div id="physical_placeholder">
            <input type="text" name="street" placeholder="Straße"/>
            <input type="text" name="house_number" placeholder="Hausnummer">
            <br>
            <input type="text" name="postal_code" placeholder="Postleitzahl">
            <input type="text" name="city" placeholder="Stadt">
        </div>

        <div id="online_placeholder">
            <input type="url" name="meeting_link" placeholder="URL zu Meeting">
        </div>
    </div>

    <div>
        <fieldset>
            <legend>Steht das Datum fest?</legend>
            <label>
                <input type="radio" name="meeting_type" value="fixed_meeting" required onchange="meeting_toggle()">
                Festes Datum
            </label>
            <label>
                <input type="radio" name="meeting_type" value="doodle" onchange="meeting_toggle()">
                Abstimmung
            </label>
            </fieldset>

        <div id="fixed_placeholder">
            <input type="date" name="fixed_date">
            <label>Von:</label>
            <input type="time" name="fixed_start_time">
            <label>Bis:</label>
            <input type="time" name="fixed_end_time">
        </div>

        <div id="doodle_placeholder">
            <p>Abstimmungsoptionen</p>
            <div>
                <label>Option 1:</label>
                <input type="date" name="option1_date">
                <label>Von:</label>
                <input type="time" name="option1_start">
                <label>Bis:</label>
                <input type="time" name="option1_end">
            </div>
            <div>
                <label>Option 2:</label>
                <input type="date" name="option2_date">
                <label>Von:</label>
                <input type="time" name="option2_start">
                <label>Bis:</label>
                <input type="time" name="option2_end">
            </div>
            <div>
                <label>Option 3:</label>
                <input type="date" name="option3_date">
                <label>Von:</label>
                <input type="time" name="option3_start">
                <label>Bis:</label>
                <input type="time" name="option3_end">
            </div>
        </div>
    </div>

    <div>
        <label for="invites">Personen einladen:</label>
        <br>
        <textarea name="invite_emails" id="invites" placeholder="max@beispiel.de, anna@beispiel.de"></textarea>
    </div>

    <br>


        <button type="button">Abbrechen</button>

    <button type="submit">Speichern</button>

</form>

{%endblock%}
