{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-5">
            <div class="card-body">
                <h3 class="mb-4">Neues Event erstellen</h3>
                <form action="{{ url_for('create_appointment', user_id=user.id) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Titel des Events</label>
                        <input type="text" name="title" class="form-control" placeholder="z.B. Team Meeting" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Beschreibung</label>
                        <textarea name="description" class="form-control" rows="3"
                                  placeholder="Worum geht es?"></textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('user_home', user_id=user.id) }}" class="btn btn-outline-secondary">Abbrechen</a>
                        <button type="submit" class="btn btn-dark">Speichern & Details hinzufügen</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
