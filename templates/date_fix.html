{% extends "base.html" %}

{% block content %}
<div class="container mt-5">

    <h3 class="mb-4">Abstimmung</h3>

    <form action="{{ url_for('set_fixed_date', user_id=user_id, appointment_id=appointment.id) }}" method="POST">

        <div class="mb-4">
            {% for choice in choices %}
            <div class="mb-2">
                <input type="radio" name="final_choice_id" id="opt_{{ choice.id }}" value="{{ choice.id }}" required>
                <label for="opt_{{ choice.id }}" class="ms-2">
                    Option {{ loop.index }}: {{ choice.votes }} Personen für: {{ choice.date }}
                </label>
            </div>
            {% endfor %}
        </div>

        <div class="mb-4">
            <p class="mb-0 small">Eingeladene Personen: {{ total_invited }}</p>
            <p class="mb-0 small">Abgestimmt: {{ total_votes }}</p>
        </div>

        <button type="submit" class="btn btn-secondary" style="background-color: #e2d8ea; color: black; border: 1px solid #ccc;">Termin festlegen</button>
    </form>

</div>
{% endblock %}
