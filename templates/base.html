<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M'easy</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

{% block navbar %}
<nav class="d-flex justify-content-between align-items-center p-3 bg-white mb-4 border-bottom">

    <div>
        {% if user_id or user %}
        <a href="{{ url_for('user_home', user_id=user.id | default(user_id)) }}" class="btn btn-outline-dark btn-sm me-2">Home</a>
        <a href="{{ url_for('new_appointment', user_id=user.id | default(user_id)) }}" class="btn btn-dark btn-sm">Event erstellen</a>
        {% endif %}
    </div>

    <h2 class="m-0 text-primary fw-bold">M'easy</h2>

</nav>
{% endblock %}

<main class="container">
    {% block content %}
    {% endblock %}
</main>

<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
